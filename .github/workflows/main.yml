name: "Build kernels for release"

env:
  OUT_DIR: "${{ github.workspace }}/out"

on:
  workflow_dispatch:

jobs:
  Build-Kernel:
    name: "🐎 Build kernel"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v3

      # =========================
      # TOOLCHAIN (FIXED CLANG)
      # =========================
      - name: "💫 Setup Clang Toolchain"
        run: |
          mkdir -p toolchains

          git clone --depth=1 https://github.com/ZyCromerZ/Clang.git toolchains/clang

          echo "$GITHUB_WORKSPACE/toolchains/clang/bin" >> $GITHUB_PATH

          # 🔥 FORCE CLANG (IMPORTANT FIX)
          echo "CC=clang" >> $GITHUB_ENV
          echo "CROSS_COMPILE=aarch64-linux-gnu-" >> $GITHUB_ENV
          echo "CROSS_COMPILE_ARM32=arm-linux-gnueabi-" >> $GITHUB_ENV

      # =========================
      # KERNEL SOURCE
      # =========================
      - name: "🌟 Clone Kernel Source"
        run: |
          git clone --recursive --depth=1 --branch master https://github.com/WuXing90/begonia_kernel_dev.git kernel_source

      # =========================
      # DEFCONFIG
      # =========================
      - name: "🧱 Make defconfig"
        working-directory: kernel_source
        run: |
          mkdir -p out
          make O=out ARCH=arm64 CC=clang begonia_user_defconfig

      # =========================
      # BUILD KERNEL (FIXED)
      # =========================
      - name: "⚙️ Build Kernel"
        working-directory: kernel_source
        run: |
          make -j$(nproc) O=out ARCH=arm64 CC=clang

      # =========================
      # PACK OUTPUT
      # =========================
      - name: "📦 Upload Kernel Image"
        run: |
          mkdir -p upload

          if [ -f kernel_source/out/arch/arm64/boot/Image.gz ]; then
            cp kernel_source/out/arch/arm64/boot/Image.gz upload/
          fi

          if [ -f kernel_source/out/arch/arm64/boot/Image ]; then
            cp kernel_source/out/arch/arm64/boot/Image upload/
          fi

      - name: "📤 Upload Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: kernel-build
          path: upload/
