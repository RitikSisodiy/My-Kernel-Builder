name: "Build kernels for release"

env:
  OUT_DIR: "${{ github.workspace }}/out"

on:
  workflow_call:
    inputs:
      from_ci:
        type: boolean
        required: false
        default: true

  workflow_dispatch:

jobs:
  Set-repos:
    name: "Parse repos.json"
    runs-on: ubuntu-latest

    outputs:
      repos: ${{ steps.generate-matrix.outputs.repos }}
      builddate: ${{ steps.generate-builddate.outputs.builddate }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Matrix
        id: generate-matrix
        run: |
          echo "repos<<EOF" >> $GITHUB_OUTPUT
          jq -s '[.[][]]' repos/repos*.json >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Set builddate
        id: generate-builddate
        run: echo "builddate=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT


  Build-Kernel:
    name: "Build kernel"
    runs-on: ubuntu-latest
    needs: Set-repos

    strategy:
      fail-fast: false
      matrix:
        repos: ${{ fromJSON(needs.Set-repos.outputs.repos) }}

    env:
      WORKSPACE: ${{ github.workspace }}
      builddate: "${{ needs.Set-repos.outputs.builddate }}"

      KNAME: ${{ matrix.repos.kernelName }}
      KERNEL_DEVICE: ${{ matrix.repos.kernelSource.device }}
      DEFCONFIG_NAME: ${{ matrix.repos.kernelSource.defconfig }}

      withRoot: ${{ matrix.repos.withRoot }}
      withSUSFS: ${{ matrix.repos.withSUSFS }}
      whichSUSFS: ${{ matrix.repos.whichSUSFS }}
      withKPM: ${{ matrix.repos.withKPM }}
      ccache: ${{ matrix.repos.ccache }}
      useAnykernel: ${{ matrix.repos.AnyKernel3.use }}
      release: ${{ matrix.repos.AnyKernel3.release }}

    steps:
      - name: Set Kernel Variables
        run: |
          echo "KERNEL_NAME=${{ matrix.repos.kernelSource.name }}" >> $GITHUB_ENV
          echo "KERNEL_REPO=${{ matrix.repos.kernelSource.repo }}" >> $GITHUB_ENV
          echo "KERNEL_BRANCH=${{ matrix.repos.kernelSource.branch }}" >> $GITHUB_ENV

          echo "toolchains=$(echo '${{ toJSON(matrix.repos.toolchains) }}' | jq -c)" >> $GITHUB_ENV
          echo "params=$(echo '${{ toJSON(matrix.repos.params) }}' | jq -c)" >> $GITHUB_ENV

          echo "THREAD=$(nproc --all)" >> $GITHUB_ENV

      - name: Install prerequisites
        run: |
          sudo apt update
          sudo apt install -y build-essential bc bison flex libssl-dev libelf-dev git curl wget zip unzip ccache

      - name: Clear old runs (optional)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run list -L400 --json databaseId -q '.[].databaseId' | tail -n+5 | xargs -I{} gh api repos/$GITHUB_REPOSITORY/actions/runs/{} -X DELETE || true

      - name: Setup ccache key
        if: ${{ env.ccache == 'true' }}
        id: ccache_key
        run: |
          echo "CACHE_KEY=$(echo -n '${{ toJSON(matrix.repos) }}' | base64 -w 0 | cut -c -48)" >> $GITHUB_OUTPUT

      - name: Cache ccache
        if: ${{ env.ccache == 'true' }}
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ env.KERNEL_NAME }}-${{ steps.ccache_key.outputs.CACHE_KEY }}-${{ env.builddate }}

      - name: Clone kernel
        run: |
          git clone --depth=1 --branch $KERNEL_BRANCH $KERNEL_REPO $KERNEL_NAME

      - name: Get toolchains
        run: |
          mkdir -p toolchains

          echo "$toolchains" | jq -c '.[]' | while read -r tc; do
            name=$(echo $tc | jq -r '.name')
            repo=$(echo $tc | jq -r '.repo')
            branch=$(echo $tc | jq -r '.branch')

            git clone --depth=1 --branch $branch $repo toolchains/$name
            echo "$GITHUB_WORKSPACE/toolchains/$name/bin" >> $GITHUB_PATH
          done

      - name: Build defconfig
        run: |
          make O=out ARCH=arm64 $DEFCONFIG_NAME

      - name: Build kernel
        run: |
          make -j$(nproc) O=out ARCH=arm64

      - name: Pack AnyKernel3
        if: ${{ env.useAnykernel == 'true' }}
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git
          cp out/arch/arm64/boot/Image.gz AnyKernel3/ || true

          zip -r kernel.zip AnyKernel3/*

      - name: Upload artifact
        if: ${{ env.useAnykernel == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ env.builddate }}
          path: kernel.zip
